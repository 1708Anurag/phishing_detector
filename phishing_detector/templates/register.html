{% extends "base.html" %}
{% block title %}Create account — PhishGuard{% endblock %}
{% block content %}
<div class="container">
  <div class="panel auth-wrap">
    <h2>Create your account</h2>
    <p class="muted">Start scanning suspicious emails in minutes.</p>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>

      <label for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" required>

      <button type="submit" class="btn btn-primary" style="width:100%;">Create account</button>
    </form>
    <p class="muted mt-2">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
